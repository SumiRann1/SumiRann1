<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .sans-title {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        fill: #F3F4F6;
      }
      .sans-desc {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        fill: #94A3B8;
      }
      .tech-badge {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 11px;
        fill: #C084FC;
      }
      .badge-bg {
        fill: #7C3AED;
        fill-opacity: 0.15;
        stroke: #A855F7;
        stroke-opacity: 0.4;
        stroke-width: 1;
      }
    </style>
    
    <linearGradient id="border-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#7C3AED" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0.1"/>
    </linearGradient>

    <radialGradient id="left-glow" cx="10%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect x="2" y="2" width="1196" height="156" rx="8" fill="#0D1117" stroke="url(#border-glow)" stroke-width="1.5"/>
  <rect x="2" y="2" width="1196" height="156" rx="8" fill="url(#left-glow)" />

  <!-- Decorative scanning lines / grid on the right -->
  <g stroke="#7C3AED" stroke-width="1" opacity="0.15" fill="none">
    <!-- Grid -->
    <path d="M 950 0 L 950 160 M 1000 0 L 1000 160 M 1050 0 L 1050 160 M 1100 0 L 1100 160 M 1150 0 L 1150 160" />
    <path d="M 900 30 L 1200 30 M 900 80 L 1200 80 M 900 130 L 1200 130" />
    <!-- Scanner line -->
    <line x1="1020" y1="10" x2="1020" y2="150" stroke="#C084FC" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Left Icon: Intersecting Rings and Magnifying Glass -->
  <g transform="translate(50, 80)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
    <circle cx="10" cy="-5" r="14" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.6"/>
    <!-- Key/Search handle -->
    <line x1="18" y1="3" x2="32" y2="17" stroke="#C084FC" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Project Info -->
  <g transform="translate(120, 48)">
    <!-- Title -->
    <text class="sans-title" x="0" y="0" font-size="24" letter-spacing="1">LOSTLINKS</text>
    <text class="sans-desc" x="150" y="-2" font-size="13" opacity="0.8">// AI-Powered Lost &amp; Found Platform</text>
    
    <!-- Description -->
    <text class="sans-desc" x="0" y="32" font-size="14">Intelligent tracking and retrieval system using Computer Vision (OCR) and structured backend flows to connect lost items with owners.</text>

    <!-- Badges -->
    <g transform="translate(0, 56)">
      <!-- Python -->
      <rect class="badge-bg" x="0" y="0" width="70" height="22" rx="4" />
      <text class="tech-badge" x="35" y="15" text-anchor="middle">PYTHON</text>

      <!-- Flask -->
      <rect class="badge-bg" x="80" y="0" width="65" height="22" rx="4" />
      <text class="tech-badge" x="112.5" y="15" text-anchor="middle">FLASK</text>

      <!-- Firebase -->
      <rect class="badge-bg" x="155" y="0" width="80" height="22" rx="4" />
      <text class="tech-badge" x="195" y="15" text-anchor="middle">FIREBASE</text>

      <!-- OCR -->
      <rect class="badge-bg" x="245" y="0" width="50" height="22" rx="4" />
      <text class="tech-badge" x="270" y="15" text-anchor="middle">OCR</text>
    </g>
  </g>

  <!-- Right side stats/details badge -->
  <g transform="translate(900, 45)" opacity="0.8">
    <rect x="0" y="0" width="240" height="70" rx="6" fill="#090A0F" stroke="#7C3AED" stroke-width="1" opacity="0.6"/>
    <!-- Details -->
    <text class="tech-badge" x="20" y="25" font-size="12">STATUS: Active</text>
    <text class="sans-desc" x="20" y="48" font-size="11" fill="#C084FC">OCR Image Parsing Integration</text>
  </g>
</svg>