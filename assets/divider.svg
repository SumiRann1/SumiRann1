<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      .divider-text {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
      }
    </style>

    <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glowing background lines -->
  <line x1="200" y1="30" x2="1000" y2="30" stroke="url(#line-fade)" stroke-width="2"/>
  <ellipse cx="600" cy="30" rx="40" ry="4" fill="url(#center-glow)"/>

  <!-- Center Hexagon Badge -->
  <g transform="translate(600, 30)">
    <!-- Hexagon border -->
    <path d="M 0 -15 L 13 -7.5 L 13 7.5 L 0 15 L -13 7.5 L -13 -7.5 Z" fill="#0D1117" stroke="#A855F7" stroke-width="1.5"/>
    <text class="divider-text" x="0" y="3" fill="#C084FC" font-size="9" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- Left/Right accent dots -->
  <circle cx="560" cy="30" r="2.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="540" cy="30" r="1.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="640" cy="30" r="2.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="660" cy="30" r="1.5" fill="#7C3AED" opacity="0.5"/>
</svg>