<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .header-title {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        fill: #F3F4F6;
        letter-spacing: 2px;
      }
      .card-title {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 11px;
        fill: #C084FC;
        letter-spacing: 1px;
      }
      .tech-text {
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 12px;
        fill: #E2E8F0;
      }
      .card-bg {
        fill: #0D1117;
        stroke: #7C3AED;
        stroke-opacity: 0.3;
        stroke-width: 1.5;
      }
      .pill-bg {
        fill: #7C3AED;
        fill-opacity: 0.08;
        stroke: #A855F7;
        stroke-opacity: 0.3;
        stroke-width: 1;
      }
    </style>

    <linearGradient id="header-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0D1117" rx="8"/>

  <!-- Dashboard Header -->
  <line x1="100" y1="35" x2="1100" y2="35" stroke="url(#header-line)" stroke-width="1.5"/>
  <rect x="500" y="20" width="200" height="30" rx="15" fill="#0D1117" stroke="#A855F7" stroke-opacity="0.5"/>
  <text class="header-title" x="600" y="40" font-size="12" text-anchor="middle">ENGINEERING TOOLBOX</text>

  <!-- ==================== COLUMN 1: LANGUAGES ==================== -->
  <g transform="translate(40, 65)">
    <rect class="card-bg" x="0" y="0" width="200" height="210" rx="8" />
    
    <!-- Icon & Title -->
    <g transform="translate(100, 30)">
      <!-- Custom Terminal Brackets Icon -->
      <path d="M -25 -5 L -32 0 L -25 5 M -15 5 L -8 0 L -15 -5" fill="none" stroke="#A855F7" stroke-width="2" stroke-linecap="round"/>
      <text class="card-title" x="0" y="4" text-anchor="middle">LANGUAGES</text>
    </g>

    <!-- Badges -->
    <g transform="translate(20, 60)">
      <!-- Python -->
      <rect class="pill-bg" x="0" y="0" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="20" text-anchor="middle">Python</text>

      <!-- C++ -->
      <rect class="pill-bg" x="0" y="44" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="64" text-anchor="middle">Modern C++</text>

      <!-- SQL -->
      <rect class="pill-bg" x="0" y="88" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="108" text-anchor="middle">SQL (MySQL/PG)</text>
    </g>
  </g>

  <!-- ==================== COLUMN 2: BACKEND ==================== -->
  <g transform="translate(270, 65)">
    <rect class="card-bg" x="0" y="0" width="200" height="210" rx="8" />
    
    <!-- Icon & Title -->
    <g transform="translate(100, 30)">
      <!-- Server Icon -->
      <rect x="-12" y="-10" width="24" height="8" rx="1.5" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <rect x="-12" y="2" width="24" height="8" rx="1.5" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <circle cx="-6" cy="-6" r="1.5" fill="#C084FC"/>
      <circle cx="-6" cy="6" r="1.5" fill="#C084FC"/>
      <text class="card-title" x="0" y="4" text-anchor="middle" transform="translate(0, 16)">BACKEND</text>
    </g>

    <!-- Badges -->
    <g transform="translate(20, 60)">
      <!-- Flask -->
      <rect class="pill-bg" x="0" y="0" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="20" text-anchor="middle">Flask</text>

      <!-- FastAPI -->
      <rect class="pill-bg" x="0" y="44" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="64" text-anchor="middle">FastAPI</text>

      <!-- REST API -->
      <rect class="pill-bg" x="0" y="88" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="108" text-anchor="middle">REST APIs</text>
    </g>
  </g>

  <!-- ==================== COLUMN 3: DATABASES ==================== -->
  <g transform="translate(500, 65)">
    <rect class="card-bg" x="0" y="0" width="200" height="210" rx="8" />
    
    <!-- Icon & Title -->
    <g transform="translate(100, 30)">
      <!-- DB Icon -->
      <ellipse cx="0" cy="-6" rx="10" ry="3.5" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <path d="M -10 -6 L -10 1 L 10 1 L 10 -6" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <path d="M -10 1 L -10 8 L 10 8 L 10 1" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <text class="card-title" x="0" y="4" text-anchor="middle" transform="translate(0, 16)">DATABASES</text>
    </g>

    <!-- Badges -->
    <g transform="translate(20, 60)">
      <!-- MySQL -->
      <rect class="pill-bg" x="0" y="0" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="20" text-anchor="middle">MySQL</text>

      <!-- PostgreSQL -->
      <rect class="pill-bg" x="0" y="44" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="64" text-anchor="middle">PostgreSQL</text>

      <!-- Supabase -->
      <rect class="pill-bg" x="0" y="88" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="108" text-anchor="middle">Supabase</text>
    </g>
  </g>

  <!-- ==================== COLUMN 4: AI ==================== -->
  <g transform="translate(730, 65)">
    <rect class="card-bg" x="0" y="0" width="200" height="210" rx="8" />
    
    <!-- Icon & Title -->
    <g transform="translate(100, 30)">
      <!-- AI Node Icon -->
      <circle cx="-8" cy="0" r="4.5" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <circle cx="8" cy="-6" r="3.5" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <circle cx="8" cy="6" r="3.5" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <line x1="-3.5" y1="-1" x2="4.5" y2="-5" stroke="#A855F7" stroke-width="1"/>
      <line x1="-3.5" y1="1" x2="4.5" y2="5" stroke="#A855F7" stroke-width="1"/>
      <text class="card-title" x="0" y="4" text-anchor="middle" transform="translate(0, 16)">AI &amp; AGENTS</text>
    </g>

    <!-- Badges -->
    <g transform="translate(20, 60)">
      <!-- LangChain -->
      <rect class="pill-bg" x="0" y="0" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="20" text-anchor="middle">LangChain</text>

      <!-- LangGraph -->
      <rect class="pill-bg" x="0" y="44" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="64" text-anchor="middle">LangGraph</text>

      <!-- Hugging Face -->
      <rect class="pill-bg" x="0" y="88" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="108" text-anchor="middle">Hugging Face</text>
    </g>
  </g>

  <!-- ==================== COLUMN 5: TOOLS ==================== -->
  <g transform="translate(960, 65)">
    <rect class="card-bg" x="0" y="0" width="200" height="210" rx="8" />
    
    <!-- Icon & Title -->
    <g transform="translate(100, 30)">
      <!-- Gear/Wrench Settings Icon -->
      <circle cx="0" cy="-2" r="7" fill="none" stroke="#A855F7" stroke-width="1.5"/>
      <path d="M 0 -9 L 0 -5 M -7 -2 L -3 -2 M 7 -2 L 3 -2 M -5 -7 L -2 -4 M 5 -7 L 2 -4" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round"/>
      <text class="card-title" x="0" y="4" text-anchor="middle" transform="translate(0, 16)">TOOLS &amp; OS</text>
    </g>

    <!-- Badges -->
    <g transform="translate(20, 60)">
      <!-- Git -->
      <rect class="pill-bg" x="0" y="0" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="20" text-anchor="middle">Git / GitHub</text>

      <!-- Linux -->
      <rect class="pill-bg" x="0" y="44" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="64" text-anchor="middle">Linux (Ubuntu)</text>

      <!-- VS Code -->
      <rect class="pill-bg" x="0" y="88" width="160" height="32" rx="6" />
      <text class="tech-text" x="80" y="108" text-anchor="middle">VS Code</text>
    </g>
  </g>
</svg>